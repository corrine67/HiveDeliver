<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">HiveDeliver Logo</title>
  <desc id="desc">Hexagonal drone delivery logo with package, circuit traces, and growth arrow.</desc>

  <defs>
